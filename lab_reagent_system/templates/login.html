{% extends 'base.html' %}
{% block title %}登录 - 电子组试剂管理系统{% endblock %}

{% block content %}
<div class="row justify-content-center mt-4">
    <div class="col-12 col-sm-10 col-md-7 col-lg-5 col-xl-4">
        <div class="card shadow-sm border-0">
            <div class="card-body p-4">
                <div class="text-center mb-4">
                    <i class="bi bi-flask-fill text-primary" style="font-size:3rem"></i>
                    <h4 class="mt-2 fw-bold">电子组试剂管理系统</h4>
                    <p class="text-muted small">请登录您的账户</p>
                </div>

                <form method="post" novalidate>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">用户名</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                            <input type="text" class="form-control" name="username"
                                   placeholder="请输入用户名" required autofocus>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">密码</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                            <input type="password" class="form-control" name="password"
                                   placeholder="请输入密码" required id="loginPwd">
                            <button class="btn btn-outline-secondary" type="button"
                                    onclick="togglePwd('loginPwd', this)">
                                <i class="bi bi-eye"></i>
                            </button>
                        </div>
                    </div>
                    <div class="d-grid mt-4">
                        <button type="submit" class="btn btn-primary btn-lg fw-semibold">
                            <i class="bi bi-box-arrow-in-right me-1"></i>登录
                        </button>
                    </div>
                </form>

                <hr class="my-3">
                <p class="text-center text-muted small mb-0">
                    还没有账户？
                    <a href="{{ url_for('auth.register') }}" class="fw-semibold">立即注册</a>
                </p>
            </div>
        </div>

        <div class="text-center mt-3">
            <small class="text-muted">默认管理员：admin</small>
        </div>
    </div>
</div>
{% endblock %}
